name: CI/CD for Growth More Frontend

on:
  push:
    branches:
      - main
      - develop
    
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Seoul
    
    steps:
      - name: checkout Repository
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Create .ENV
        run: |
          if [[ "${{github.ref_name}}" == "main" ]]; then
            echo "${{ secrets.ENV_PROD }}" > .env
          else
            echo "${{ secrets.ENV_DEV }}" > .env
          fi
        shell: bash

      - name: install npm dependencies
        run: npm install
      
      - name: Build Project
        run: npm run build
      
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./dist
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./dist

      - name: Debug Artifact Path
        run: ls -R

      - name: SEtting Env Variable
        run: |
          if [[ "${{github.ref_name}}" == "main" ]]; then
            echo "PROFILE="prod" >> $GITHUB_ENV
          else
            echo "PROFILE="dev" >> $GITHUB_ENV
          fi

      - name: Create SSH Key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_key.key
          chmod 600 oci_key.key

      - name: Copy files to OCI Server
        run: |
          scp -i oci_key.key -o StrictHostKeyChecking=no -r ./dist ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/home/ubuntu/project/gomo/client/${{env.PROFILE }}/
      - name: SSH into OCI and Restart Container
        run: |
          ssh -i oci_key.key -o StrictHostKeyChecking=no ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'EOF'
            cd /home/ubuntu/project/gomo/client
            docker compose -f docker-compose.${{ env.PROFILE }}.yml down || true
            docker compose -f docker-compose.${{ env.PROFILE }}.yml up --build -d
          EOF
